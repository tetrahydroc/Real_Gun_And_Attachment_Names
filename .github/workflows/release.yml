name: Build and Release VMZ

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get and bump version if tag exists
        id: version
        run: |
          VERSION=$(grep 'version=' mod.txt | head -1 | cut -d'"' -f2)
          ORIGINAL=$VERSION

          # Bump patch version until we find an unused tag
          while git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; do
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"
          done

          # Update mod.txt if version changed
          if [ "$VERSION" != "$ORIGINAL" ]; then
            sed -i "s/version=\"$ORIGINAL\"/version=\"$VERSION\"/" mod.txt
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add mod.txt
            git commit -m "Bump version to $VERSION"
            git push
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build VMZ
        run: |
          mkdir -p build
          # mod.txt at root, everything else in mods/RealGunAttachmentNames/
          cp mod.txt build/mod.txt
          mkdir -p build/mods/RealGunAttachmentNames
          cp Main.gd build/mods/RealGunAttachmentNames/
          cp -r Resources build/mods/RealGunAttachmentNames/
          cd build
          zip -r ../RealGunAttachmentNames.vmz mod.txt mods/RealGunAttachmentNames/

      - name: Create versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Real Gun & Attachment Names v${{ steps.version.outputs.version }}
          files: RealGunAttachmentNames.vmz
          generate_release_notes: true

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Real Gun & Attachment Names (Latest)
          files: RealGunAttachmentNames.vmz
          body: "Latest build - v${{ steps.version.outputs.version }}"
          make_latest: true
